# yaml file path defined in kumi.xacro (kumi_control.xacro)
---
controller_manager:
  ros__parameters:
    update_rate: 100
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
      update_rate: 10
    joint_group_effort_controller:
      type: effort_controllers/JointGroupEffortController
      update_rate: 10

joint_group_effort_controller:
  ros__parameters:
    joints:
    - front_sh
    - front_ank
    - back_sh
    - back_ank
    state_interfaces:
    - position
    - velocity
    command_interfaces:
    - effort
